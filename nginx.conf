server {
    listen 80;

    # Strip /rest/v1 prefix and proxy to PostgREST.
    # PostgREST already sends its own CORS headers on proxied responses,
    # so we only add CORS headers here for the OPTIONS preflight (which nginx
    # handles directly with return 204, before touching PostgREST).
    location /rest/v1/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'apikey, Authorization, Content-Type, Prefer, Accept, Range, X-Client-Info';
            return 204;
        }

        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
    }
}
